- id: '1780849082145'
  alias: R21_CleanMode_DisableLatch
  description: 清洁模式，关闭窗户童锁
  trigger:
  - platform: state
    entity_id:
    - input_boolean.cleaning_mode_switch
    from: 'off'
    to: 'on'
  condition: []
  action:
  - service: input_boolean.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.nursery_window_latch
  mode: single
- alias: R22_TempHigh_WindowOpen
  description: Only open the nursery window when temperature is high, the latch is
    enabled, and cleaning mode is currently active. This prevents stale latch state
    from reopening the window after cleaning ends.
  trigger:
  - platform: numeric_state
    entity_id:
    - input_number.nursery_temp_sensor
    above: 30
  condition:
  - condition: state
    entity_id: input_boolean.nursery_window_latch
    state: 'on'
  - condition: state
    entity_id: input_boolean.cleaning_mode_switch
    state: 'on'
  action:
  - service: input_boolean.turn_on
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.nursery_window
  mode: single
  id: '1780849846827'
- id: '1780849977378'
  alias: R23_Charger_StopAutoClose
  description: 刚开始充电，禁用自动关门
  trigger:
  - platform: state
    entity_id:
    - input_boolean.ev_charger_status
    from: 'off'
    to: 'on'
  condition: []
  action:
  - service: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.garage_auto_close_enabled
  mode: single
- id: '1780850451101'
  alias: R24_Night_CloseGarageDoor
  description: 晚上十一点关车库门
  trigger:
  - platform: numeric_state
    entity_id:
    - input_datetime.systemtime
    attribute: hour
    above: 22
    below: 24
  condition:
  - condition: state
    entity_id: input_boolean.garage_auto_close_enabled
    state: 'on'
  - condition: state
    entity_id: input_boolean.garage_door
    state: 'on'
  action:
  - service: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.garage_door
  mode: single
- alias: R25_CleanMode_End_ResetLatchAndWindow
  description: When cleaning mode turns off, restore the nursery to a secured state
    by turning off the window latch and closing the window.
  trigger:
  - platform: state
    entity_id:
    - input_boolean.cleaning_mode_switch
    from: 'on'
    to: 'off'
  condition: []
  action:
  - service: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.nursery_window_latch
  - service: input_boolean.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: input_boolean.nursery_window
  mode: single
  id: it01_c001
